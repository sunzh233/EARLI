# cuOpt injection config for PDPTW n=1000 test instances.
# Injects RL solutions into cuOpt for final quality comparison.
system:
  env_device: cpu
  model_device: cuda
  tree_device: cpu
  save_obs_on_gpu: True
  use_tensordict: True
  allow_wandb: False
  wandb_user: null
  wandb_project: null
  run_name: null
  no_sweep: False

speedups:
  use_fabric: False

names:
  run_title: 'cuopt_pdptw_1000'
  methods: ['RL+cuOpt']
  baseline: cuOpt
  main_method: RL+cuOpt
  verbose: 2

paths:
  # PKL dataset file (produced by benchmark_parser.py)
  problems: datasets/pdptw_1000.pkl
  # RL inference log file (set at runtime in the notebook)
  solutions: null
  solutions_source: null
  naive_source: null
  out_summary: test_summary_pdptw_1000

problem:
  env: pdptw
  problems_range: null
  last_return_to_depot: True
  remove_last_depot_from_solution: True

cuopt:
  runtimes: [1.0]
  fixed_vehicles: True
  spare_vehicles: 0
  use_reference_for_num_vehicles: False
  normalization: null
  pull_freq: 0
  repetitions: 1

injection:
  max_injections: null
  can_choose_injections: False
  post_ls_solutions: 1
  both_rl_and_naive: 0
  avoid_suboptimal: True
  sort: cost
  n_naives: 1
  use_greedy: True
  rl_runtime: 0
  naive_runtime: 0

logger:
  logging_level: 20
  post_analysis: 0
