# Configuration for PDPTW inference on Li&Lim n=1000 benchmark (test only).
# The n=1000 scale instances are EXCLUSIVELY used for testing – never for training
# or validation.
system:
  env_device: cpu
  model_device: cuda
  tree_device: cpu
  buffer_device: cpu
  save_obs_on_gpu: True
  use_tensordict: True
  allow_wandb: False
  run_name: null
  no_sweep: False
  compatibility_mode: null

train:
  method: 'tree_based'
  optimizer: 'adam'
  seed: 0
  deterministic_algo: True
  gamma: 1
  multi_gpu: False
  block_decreasing_action: False
  epochs: 0
  batch_size: 1024
  n_beams: 8
  pretrained_fname: null   # set to pretrained model path before running
  pretrained_run: null
  n_parallel_problems: 16
  learning_rate: 3e-4

eval:
  # Run benchmark_parser.py first:
  #   python -m earli.benchmark_parser pdptw "li&lim benchmark/pdptw1000" \
  #           datasets/pdptw_1000.pkl
  data_file: datasets/pdptw_1000.pkl
  max_problems: null
  apply_local_search: True
  deterministic_test_beam: True
  detailed_test_log: False
  save_full_tree: False
  naive_greedy: False

problem_setup:
  env: pdptw
  problem_range: null
  minimize_vehicles: True
  last_return_to_depot: True
  distance_Lp_norm: 2
  vehicle_penalty: 0
  unused_capacity_penalty: 0
  spare_numeric_capacity: 0.0
  single_site_visit: True

representation:
  input_repr: Graph
  k_connectivity: 8
  self_loops: True
  normalize: True
  normalize_pos_obs_like_reward: True
  normalize_reward_by_problem_size: False
  add_distance_to_head: True

logger:
  episode_stats_limit: 1000
  logging_level: 30

model:
  model_type: attention
  head_model_type: attention
  embedding_dim: 128
  use_pair_norm: True
  use_batch_norm: False
  num_intermediate_features: 64
  use_bias: True
  agg_type: sum
  edge_model_layers: 1
  value_from_depot: False
  reset_layers_freq: 0
  reset_last_layers: False
  reset_last_k_modules: 0
  single_network: False
  attention: True
  split_actor_and_state_models: False
  lazy: True
  eight_rounding: False

attention_model:
  layer_normalization: 'batch'
  n_attention_layers_actor: 3
  n_attention_layers_critic: 3
  n_attention_layers_head_module: 2
  n_attention_heads: 8
  reweight_by_distance: False
  reweight_function: exponential
  use_basic_head_encoding: True
  separate_head_and_action_model: False
  num_head_encoder_layers: 2

sampler:
  score_to_prob: probs
  temperature: 0.3
  diversity_penalty: 0
  normalize_attention: True
  tanh_clipping: 10
  complement_k_beams_calc: False
  use_full_action_space_calc: True
  autoregressive: True

muzero:
  expansion_method: 'KPPO'
  deterministic_branch_in_k_beams: True
  zeroize_deterministic_log_prob: False
  loss_type: 'ppo'
  max_leaves: 10
  data_steps_per_epoch: 16
  hash_states: True
  max_moves: 5000

speedups:
  use_ray: False
  use_fabric: False
  n_workers: 4
  amp: False
  fused_optimizer: True
  compile_mode: null
  foreach_optimizer: False
  share_data: True

cuopt:
  use_cuopt: False
  climbers: 2048

buffer:
  max_buffer_size: 300000
  allow_overflow: True
  on_policy_buffer: True
  buffer_precision: float32
  randomize_minibatches: False
