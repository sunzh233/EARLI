---
system:
  env_device: cpu
  model_device: cuda
  tree_device: cpu
  buffer_device: cpu
  save_obs_on_gpu: true
  use_tensordict: true
  allow_wandb: false
  run_name: null
  no_sweep: false
  compatibility_mode: null

train:
  method: "tree_based"
  optimizer: "adam"
  seed: 0
  deterministic_algo: true
  gamma: 1
  multi_gpu: false
  block_decreasing_action: false
  epochs: 0
  batch_size: 64
  n_beams: 8
  pretrained_fname: "outputs/vrptw_model_homberger_800.m"
  pretrained_run: null
  save_model_path: "outputs/vrptw_model_homberger_700.m"
  n_parallel_problems: 12
  learning_rate: 1e-4

eval:
  data_file: datasets/homberger_vrptw_curriculum/vrptw_test_1000.pkl
  max_problems: null
  apply_local_search: false
  deterministic_test_beam: true
  detailed_test_log: true
  save_full_tree: false
  naive_greedy: false

problem_setup:
  env: vrptw
  problem_range: null
  minimize_vehicles: true
  last_return_to_depot: true
  distance_Lp_norm: 2
  time_penalty: 0.0
  time_penalty_early: 0.0
  time_penalty_late: 1.0
  vehicle_penalty: 10
  unused_capacity_penalty: 0.2
  spare_numeric_capacity: 0
  single_site_visit: true

representation:
  input_repr: Graph
  k_connectivity: 32
  self_loops: true
  normalize: true
  normalize_pos_obs_like_reward: true
  normalize_reward_by_problem_size: false
  add_distance_to_head: true

logger:
  episode_stats_limit: 1000
  logging_level: 30

model:
  model_type: attention
  head_model_type: attention
  embedding_dim: 512
  use_pair_norm: true
  use_batch_norm: false
  num_intermediate_features: 512
  use_bias: true
  agg_type: sum
  edge_model_layers: 2
  value_from_depot: false
  reset_layers_freq: 0
  reset_last_layers: false
  reset_last_k_modules: 0
  single_network: false
  attention: true
  split_actor_and_state_models: false
  lazy: true
  eight_rounding: false

attention_model:
  layer_normalization: "layer"
  n_attention_layers_actor: 6
  n_attention_layers_critic: 4
  n_attention_layers_head_module: 4
  n_attention_heads: 8
  reweight_by_distance: false
  reweight_function: exponential
  use_basic_head_encoding: true
  separate_head_and_action_model: false
  num_head_encoder_layers: 3

sampler:
  score_to_prob: probs
  temperature: 0.3
  diversity_penalty: 0.02
  normalize_attention: true
  tanh_clipping: 10
  complement_k_beams_calc: false
  use_full_action_space_calc: true
  autoregressive: true

muzero:
  expansion_method: "KPPO"
  deterministic_branch_in_k_beams: true
  zeroize_deterministic_log_prob: false
  loss_type: "ppo"
  max_leaves: 10
  data_steps_per_epoch: 256
  hash_states: true
  max_moves: 5000

speedups:
  use_ray: false
  use_fabric: false
  n_workers: 4
  amp: false
  fused_optimizer: true
  compile_mode: null
  foreach_optimizer: false
  share_data: true

cuopt:
  use_cuopt: false
  climbers: 2048

buffer:
  max_buffer_size: 300000
  allow_overflow: true
  on_policy_buffer: true
  buffer_precision: float32
  randomize_minibatches: false
